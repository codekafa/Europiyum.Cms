services:
  postgres:
    image: postgres:16-alpine
    container_name: cms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-evropiyum}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-evropiyum}"]
      interval: 10s
      timeout: 5s
      retries: 12

  cms-admin:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT_PATH: src/Europiyum.Cms.Web/Europiyum.Cms.Web.csproj
        PROJECT_DLL: Europiyum.Cms.Web.dll
    container_name: cms-admin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__CmsDatabase: Host=postgres;Port=5432;Database=${POSTGRES_DB:-evropiyum};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-evropiyum};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      AdminAuth__Users__0__Username: ${ADMIN_USERNAME:-admin}
      AdminAuth__Users__0__Password: ${ADMIN_PASSWORD:-ChangeMe!}
      AdminAuth__Users__0__DisplayName: ${ADMIN_DISPLAY_NAME:-Evropiyum Admin}
    ports:
      - "${CMS_ADMIN_PORT:-5093}:8080"

  web-partexo:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT_PATH: src/Europiyum.Web.Partexo/Europiyum.Web.Partexo.csproj
        PROJECT_DLL: Europiyum.Web.Partexo.dll
    container_name: web-partexo
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      CompanySite__CompanyCode: ${PARTEXO_COMPANY_CODE:-partexo}
      ConnectionStrings__CmsDatabase: Host=postgres;Port=5432;Database=${POSTGRES_DB:-evropiyum};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-evropiyum};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${PARTEXO_PORT:-5201}:8080"

  web-rutenyum:
