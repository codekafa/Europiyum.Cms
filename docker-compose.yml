      context: .
      dockerfile: Dockerfile
      args:
        PROJECT_PATH: src/Europiyum.Web.RutenyumSolutions/Europiyum.Web.RutenyumSolutions.csproj
        PROJECT_DLL: Europiyum.Web.RutenyumSolutions.dll
    container_name: web-rutenyum
